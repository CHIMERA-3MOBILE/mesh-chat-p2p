<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESH CHAT // TERMINAL</title>
<style>
  /* ── Fonts ─────────────────────────────────────────────────── */
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  /* ── Variables ──────────────────────────────────────────────── */
  :root {
    --green:      #00ff41;
    --green-dim:  #00aa2a;
    --green-dark: #004d10;
    --green-glow: rgba(0,255,65,0.15);
    --amber:      #ffb000;
    --red:        #ff3333;
    --bg:         #000000;
    --bg2:        #030e03;
    --bg3:        #051205;
    --border:     #0a3a0a;
    --font-mono:  'Share Tech Mono', 'Courier New', monospace;
    --font-vt:    'VT323', monospace;
    --sidebar-w:  200px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 14px;
    overflow: hidden;
    cursor: default;
  }

  /* ── Scanline overlay ────────────────────────────────────────── */
  body::before {
    content: '';
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
  }

  @keyframes flicker {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.92} 94%{opacity:1} 97%{opacity:.96} 98%{opacity:1}
  }
  body { animation: flicker 8s infinite; }

  /* ═══════════════════════════════════════════════════════════════
     LOGIN SCREEN
  ═══════════════════════════════════════════════════════════════ */
  #loginScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
    gap: 0;
  }

  .login-logo {
    font-family: var(--font-vt);
    font-size: clamp(28px, 5vw, 48px);
    color: var(--green);
    text-align: center;
    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-dark);
    letter-spacing: 4px;
    line-height: 1.15;
    white-space: pre;
    margin-bottom: 8px;
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100%{ text-shadow: 0 0 20px var(--green),0 0 40px var(--green-dark); }
    50%    { text-shadow: 0 0 30px var(--green),0 0 60px var(--green),0 0 80px var(--green-dark); }
  }

  .login-sub {
    font-size: 11px;
    color: var(--green-dim);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .login-box {
    border: 1px solid var(--green-dim);
    padding: 32px 40px;
    background: var(--bg2);
    box-shadow: 0 0 40px var(--green-glow), inset 0 0 20px rgba(0,255,65,0.04);
    width: min(420px, 90vw);
  }

  .login-box label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .login-box input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green-dim);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 18px;
    padding: 8px 4px;
    outline: none;
    letter-spacing: 2px;
    transition: border-color .2s;
  }
  .login-box input:focus { border-bottom-color: var(--green); }
  .login-box input::placeholder { color: var(--green-dark); }

  .login-btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, box-shadow .15s;
  }
  .login-btn:hover, .login-btn:active {
    background: var(--green-glow);
    box-shadow: 0 0 20px var(--green-dark);
  }
  .login-btn.secondary {
    border-color: var(--green-dark);
    color: var(--green-dim);
    margin-top: 12px;
  }
  .login-btn.secondary:hover { border-color: var(--green-dim); }

  .login-warn {
    margin-top: 20px;
    font-size: 10px;
    color: var(--green-dark);
    letter-spacing: 1px;
    text-align: center;
  }

  /* Server status pill */
  #serverStatusPill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--amber);
    margin-bottom: 20px;
    border: 1px solid var(--amber);
    padding: 4px 10px;
    border-radius: 2px;
  }
  #serverStatusPill.ready { color: var(--green); border-color: var(--green); }
  #serverStatusPill .pill-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: blink 1s ease-in-out infinite;
  }

  /* Peer discovery list */
  #peerDiscoverySection {
    display: none;
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  #peerDiscoverySection.visible { display: block; }
  #peerDiscoverySection label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--green-dark);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .peer-item {
    padding: 6px 8px;
    font-size: 12px;
    color: var(--green-dim);
    border: 1px solid var(--border);
    margin-bottom: 4px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all .15s;
  }
  .peer-item:hover { border-color: var(--green-dim); color: var(--green); }
  .peer-item .peer-tag {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--green-dark);
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor {
    display: inline-block;
    width: 10px; height: 16px;
    background: var(--green);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink .75s step-end infinite;
  }

  /* ═══════════════════════════════════════════════════════════════
     MAIN LAYOUT
  ═══════════════════════════════════════════════════════════════ */
  #app {
    height: 100vh;
    display: none;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-areas:
      "header  header"
      "sidebar chat"
      "sidebar input";
  }
  #app.visible { display: grid; }

  /* ── Header ─────────────────────────────────────────────────── */
  #header {
    grid-area: header;
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
    box-shadow: 0 2px 20px rgba(0,255,65,0.06);
  }
  .hdr-logo { font-family: var(--font-vt); font-size: 22px; letter-spacing: 3px; color: var(--green); text-shadow: 0 0 10px var(--green); white-space: nowrap; }
  .hdr-sep  { color: var(--green-dark); margin: 0 4px; }
  .hdr-status { font-size: 11px; letter-spacing: 2px; color: var(--green-dim); }
  .hdr-dot  { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s ease-in-out infinite; margin-right: 6px; }
  .hdr-ip   { margin-left: auto; font-size: 11px; color: var(--green-dim); letter-spacing: 1px; text-align: right; }
  .hdr-ip span { color: var(--green); font-size: 13px; font-weight: bold; }

  /* ── Sidebar ─────────────────────────────────────────────────── */
  #sidebar {
    grid-area: sidebar;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sb-section-title { font-size: 9px; letter-spacing: 3px; color: var(--green-dark); text-transform: uppercase; padding: 12px 14px 6px; border-bottom: 1px solid var(--border); }
  #userList { flex: 1; overflow-y: auto; padding: 8px 0; }
  #userList::-webkit-scrollbar { width: 4px; }
  #userList::-webkit-scrollbar-track { background: transparent; }
  #userList::-webkit-scrollbar-thumb { background: var(--green-dark); }
  .user-item { padding: 5px 14px; font-size: 12px; color: var(--green-dim); letter-spacing: 1px; display: flex; align-items: center; gap: 8px; transition: color .2s; }
  .user-item.me { color: var(--green); }
  .user-item::before { content: '›'; color: var(--green-dark); font-size: 14px; }
  .user-item.me::before { color: var(--green); }

  /* ── Sidebar bottom ─────────────────────────────────────────── */
  .sb-bottom { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .sb-btn { padding: 7px 10px; background: transparent; border: 1px solid var(--border); color: var(--green-dim); font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-align: center; cursor: pointer; text-transform: uppercase; transition: all .15s; width: 100%; }
  .sb-btn:hover, .sb-btn:active { border-color: var(--green-dim); color: var(--green); background: var(--green-glow); }
  .sb-btn.amber { border-color: #3a2a00; color: var(--amber); }
  .sb-btn.amber:hover { border-color: var(--amber); background: rgba(255,176,0,.08); }
  .sb-stat { font-size: 10px; color: var(--green-dark); letter-spacing: 1px; padding: 2px 0; }
  .sb-stat span { color: var(--green-dim); }

  /* ── Chat ────────────────────────────────────────────────────── */
  #chatBox {
    grid-area: chat;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #chatBox::-webkit-scrollbar { width: 4px; }
  #chatBox::-webkit-scrollbar-track { background: transparent; }
  #chatBox::-webkit-scrollbar-thumb { background: var(--green-dark); }

  .msg { font-size: 13px; line-height: 1.5; padding: 2px 0; word-break: break-word; }
  .msg-system { color: var(--green-dark); font-size: 11px; letter-spacing: 1px; }
  .sys-tag { color: var(--green-dim); margin-right: 6px; }
  .msg-chat { display: flex; flex-wrap: wrap; gap: 0 8px; }
  .msg-chat .meta { display: flex; gap: 8px; flex-shrink: 0; }
  .msg-chat .time { color: var(--green-dark); font-size: 11px; }
  .msg-chat .nick { color: var(--green-dim); }
  .msg-chat.mine .nick { color: var(--green); }
  .msg-chat .text { color: var(--green); }
  .msg-status { font-size: 11px; color: var(--green-dark); border-left: 2px solid var(--green-dark); padding-left: 8px; margin: 4px 0; }
  .status-label { color: var(--amber); margin-right: 8px; font-size: 10px; letter-spacing: 2px; }
  .bat-val { color: var(--amber); }

  /* ── Typing bar ──────────────────────────────────────────────── */
  #typingBar { padding: 2px 16px; font-size: 11px; color: var(--green-dark); min-height: 18px; font-style: italic; }

  /* ── Input ───────────────────────────────────────────────────── */
  #inputArea {
    grid-area: input;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .prompt { color: var(--green-dim); font-size: 13px; white-space: nowrap; flex-shrink: 0; }
  #msgInput { flex: 1; background: transparent; border: none; color: var(--green); font-family: var(--font-mono); font-size: 14px; outline: none; letter-spacing: 1px; min-width: 0; caret-color: var(--green); }
  #msgInput::placeholder { color: var(--green-dark); }
  #sendBtn { padding: 6px 14px; background: transparent; border: 1px solid var(--green-dark); color: var(--green-dark); font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s; }
  #sendBtn:hover, #sendBtn:active { border-color: var(--green); color: var(--green); }

  /* ── Toast ───────────────────────────────────────────────────── */
  #toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--green-dim); color: var(--green); font-size: 12px; padding: 8px 16px; letter-spacing: 1px; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; white-space: nowrap; z-index: 1000; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════ LOGIN SCREEN ═══════ -->
<div id="loginScreen">
  <div class="login-logo">MESH&#10;CHAT</div>
  <div class="login-sub" id="loginSub">INITIALIZING SERVER...</div>

  <div id="serverStatusPill">
    <span class="pill-dot"></span>
    <span id="pillText">STARTING NODE SERVER</span>
  </div>

  <div class="login-box">
    <label for="nicknameInput">CALLSIGN<span class="cursor"></span></label>
    <input id="nicknameInput" type="text" maxlength="24"
           placeholder="enter your callsign..."
           autocomplete="off" spellcheck="false">

    <button class="login-btn" id="joinBtn">▶ HOST MESH</button>
    <button class="login-btn secondary" id="scanBtn">⟳ SCAN FOR PEERS</button>

    <!-- Discovered peers appear here -->
    <div id="peerDiscoverySection">
      <label>DISCOVERED PEERS ON NETWORK</label>
      <div id="peerList">
        <div style="font-size:11px;color:var(--green-dark);padding:4px 0">Scanning...</div>
      </div>
    </div>

    <div class="login-warn">
      VOLATILE STORAGE · LAN ONLY · NO ENCRYPTION AT REST
    </div>
  </div>
</div>

<!-- ═══════ MAIN APP ═══════ -->
<div id="app">

  <div id="header">
    <span class="hdr-logo">MESH CHAT</span>
    <span class="hdr-sep">|</span>
    <span class="hdr-status"><span class="hdr-dot"></span><span id="connStatus">CONNECTING</span></span>
    <span class="hdr-ip">HOST IP: <span id="hostIPDisplay">---</span></span>
  </div>

  <div id="sidebar">
    <div class="sb-section-title">PEERS ONLINE</div>
    <div id="userList"></div>
    <div class="sb-bottom">
      <button class="sb-btn amber" id="pushDataBtn">▲ PUSH DEVICE DATA</button>
      <div class="sb-stat">UPTIME: <span id="uptimeStat">00:00</span></div>
      <div class="sb-stat">MESSAGES: <span id="msgCountStat">0</span></div>
      <div class="sb-stat">PEERS: <span id="peerCountStat">0</span></div>
    </div>
  </div>

  <div id="chatBox"></div>
  <div id="typingBar"></div>

  <div id="inputArea">
    <span class="prompt" id="promptLabel">GHOST_01 &gt;</span>
    <input id="msgInput" type="text" maxlength="2000"
           placeholder="type message and press ENTER..."
           autocomplete="off" spellcheck="false">
    <button id="sendBtn">SEND</button>
  </div>

</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════
//  MESH CHAT — Frontend Logic
//  Serverless P2P: WebRTC DataChannel + Zeroconf (mDNS)
// ════════════════════════════════════════════════════════════════

// ── State ─────────────────────────────────────────────────────────
let myNick      = '';
let msgCount    = 0;
let startTime   = Date.now();
let typingTimer;
let isTyping    = false;
let typingPeers = {};
let p2pReady    = false;

// Stable device id for the current app run (RAM-only; resets on app close).
const myId = (crypto?.randomUUID?.() || `id-${Math.random().toString(16).slice(2)}-${Date.now()}`).slice(0, 36);

// ── DOM refs ──────────────────────────────────────────────────────
const loginScreen         = document.getElementById('loginScreen');
const appEl               = document.getElementById('app');
const nicknameInput       = document.getElementById('nicknameInput');
const joinBtn             = document.getElementById('joinBtn');
const scanBtn             = document.getElementById('scanBtn');
const chatBox             = document.getElementById('chatBox');
const typingBar           = document.getElementById('typingBar');
const msgInput            = document.getElementById('msgInput');
const sendBtn             = document.getElementById('sendBtn');
const userListEl          = document.getElementById('userList');
const connStatus          = document.getElementById('connStatus');
const hostIPDisplay       = document.getElementById('hostIPDisplay');
const promptLabel         = document.getElementById('promptLabel');
const pushDataBtn         = document.getElementById('pushDataBtn');
const msgCountStat        = document.getElementById('msgCountStat');
const peerCountStat       = document.getElementById('peerCountStat');
const toastEl             = document.getElementById('toast');
const serverStatusPill    = document.getElementById('serverStatusPill');
const pillText            = document.getElementById('pillText');
const loginSub            = document.getElementById('loginSub');
const peerDiscoverySection = document.getElementById('peerDiscoverySection');
const peerListEl          = document.getElementById('peerList');

// ── Uptime ────────────────────────────────────────────────────────
setInterval(() => {
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  document.getElementById('uptimeStat').textContent =
    `${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}, 1000);

// ── Toast ─────────────────────────────────────────────────────────
let toastTO;
function showToast(html) {
  toastEl.innerHTML = html;
  toastEl.classList.add('show');
  clearTimeout(toastTO);
  toastTO = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// ── Render helpers ────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scrollBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

function appendSystem(text) {
  const d = document.createElement('div');
  d.className = 'msg msg-system';
  d.innerHTML = `<span class="sys-tag">[SYS]</span>${escHtml(text)}`;
  chatBox.appendChild(d); scrollBottom();
}

function appendMessage({ from, text, time }, mine) {
  const d = document.createElement('div');
  d.className = `msg msg-chat${mine ? ' mine' : ''}`;
  d.innerHTML =
    `<span class="meta"><span class="time">[${escHtml(time)}]</span>` +
    `<span class="nick">${escHtml(from)}</span></span>` +
    `<span class="text">${escHtml(text)}</span>`;
  chatBox.appendChild(d);
  msgCount++;
  msgCountStat.textContent = msgCount;
  scrollBottom();
}

function appendStatus({ from, battery, time, serverTime }) {
  const batStr = battery !== null ? `${battery}%` : 'N/A';
  const d = document.createElement('div');
  d.className = 'msg msg-status';
  d.innerHTML =
    `<span class="status-label">▲ STATUS PUSH</span>` +
    `<b>${escHtml(from)}</b> ` +
    `│ BATTERY: <span class="bat-val">${escHtml(batStr)}</span> ` +
    `│ DEVICE TIME: ${escHtml(time)} ` +
    `│ SERVER: ${escHtml(serverTime)}`;
  chatBox.appendChild(d); scrollBottom();
}

function renderUsers(list) {
  userListEl.innerHTML = '';
  list.forEach(nick => {
    const d = document.createElement('div');
    d.className = `user-item${nick === myNick ? ' me' : ''}`;
    d.textContent = nick + (nick === myNick ? ' [you]' : '');
    userListEl.appendChild(d);
  });
  peerCountStat.textContent = list.length;
}

function updateTypingBar() {
  const peers = Object.keys(typingPeers).filter(n => n !== myNick);
  typingBar.textContent = peers.length === 0 ? '' :
    peers.length === 1 ? `${peers[0]} is typing...` :
    `${peers.slice(0,-1).join(', ')} and ${peers.slice(-1)} are typing...`;
}

async function getBattery() {
  try {
    if ('getBattery' in navigator) {
      const b = await navigator.getBattery();
      return Math.round(b.level * 100);
    }
  } catch(e) {}
  return null;
}

// ════════════════════════════════════════════════════════════════
//  Zeroconf discovery + WebRTC signaling
// ════════════════════════════════════════════════════════════════

const SERVICE_DOMAIN = 'local.';
const PRESENCE_TYPE = '_meshchat._tcp.';
const SIGNAL_TYPE = '_meshchat-signal._tcp.';

// Discovered peers via mDNS (presence)
let discoveredPeers = []; // [{ id, name, ipv4 }]
const discoveredPeerById = new Map();
let isWatchingPresence = false;
let isWatchingSignals = false;

// Active P2P connections
/** @type {Map<string, { id: string, name: string, pc: RTCPeerConnection, dc: RTCDataChannel | null, connected: boolean }>} */
const peers = new Map();

function getZeroconf() {
  return window.cordova?.plugins?.zeroconf || null;
}

function setP2pStatus(ready, errMsg) {
  if (ready) {
    serverStatusPill.classList.add('ready');
    pillText.textContent = `P2P READY · ID ${myId.slice(0, 8)}`;
    loginSub.textContent = 'MESH CHAT // WEBRTC LAN';
    hostIPDisplay.textContent = `${myId.slice(0, 8)}…`;
  } else {
    serverStatusPill.classList.remove('ready');
    pillText.textContent = errMsg ? `ERROR: ${errMsg}` : 'P2P OFFLINE';
  }
}

function renderDiscoveredPeers() {
  peerListEl.innerHTML = '';
  if (discoveredPeers.length === 0) {
    peerListEl.innerHTML = '<div style="font-size:11px;color:var(--green-dark);padding:4px 0">No peers found.</div>';
    return;
  }
  discoveredPeers.forEach(peer => {
    const d = document.createElement('div');
    d.className = 'peer-item';
    d.innerHTML =
      `<span>${escHtml(peer.name)}</span>` +
      `<span class="peer-tag">${escHtml(peer.ipv4 || '—')}</span>`;
    d.addEventListener('click', () => {
      beginConnect(peer.id);
      showToast(`Connecting to ${escHtml(peer.name)}...`);
    });
    peerListEl.appendChild(d);
  });
}

function makePeerDisplayName() {
  return myNick ? myNick : `NODE_${myId.slice(0, 4)}`;
}

async function registerPresence() {
  const zeroconf = getZeroconf();
  if (!zeroconf) return;

  try {
    zeroconf.registerAddressFamily = 'ipv4';
    zeroconf.watchAddressFamily = 'ipv4';
  } catch (_) {}

  zeroconf.register(
    PRESENCE_TYPE,
    SERVICE_DOMAIN,
    makePeerDisplayName(),
    9,
    { app: 'meshchat', id: myId, name: makePeerDisplayName() },
    () => {},
    (err) => console.error('[Zeroconf] presence register failed', err),
  );
}

function b64EncodeUnicode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}

function b64DecodeUnicode(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function chunkString(s, size) {
  const out = [];
  for (let i = 0; i < s.length; i += size) out.push(s.slice(i, i + size));
  return out;
}

function publishSignal({ toId, sigType, sdp }) {
  const zeroconf = getZeroconf();
  if (!zeroconf) return;

  const payload = b64EncodeUnicode(JSON.stringify({ sdp }));
  const chunks = chunkString(payload, 600);
  const txt = { from: myId, to: toId, t: sigType, n: String(chunks.length) };
  chunks.forEach((c, i) => { txt[`p${i}`] = c; });

  const svcName = `sig-${sigType}-${myId.slice(0, 6)}-${toId.slice(0, 6)}-${Date.now()}`;
  zeroconf.register(
    SIGNAL_TYPE,
    SERVICE_DOMAIN,
    svcName,
    9,
    txt,
    () => {},
    (err) => console.error('[Zeroconf] signal register failed', err),
  );
}

function parseSignalTxt(txtRecord) {
  try {
    const n = Number(txtRecord?.n || 0);
    if (!Number.isFinite(n) || n <= 0 || n > 12) return null;
    let b64 = '';
    for (let i = 0; i < n; i++) {
      const part = txtRecord[`p${i}`];
      if (!part) return null;
      b64 += part;
    }
    const json = b64DecodeUnicode(b64);
    return JSON.parse(json);
  } catch (_) {
    return null;
  }
}

function ensureWatchingPresence() {
  const zeroconf = getZeroconf();
  if (!zeroconf || isWatchingPresence) return;
  isWatchingPresence = true;

  zeroconf.watch(PRESENCE_TYPE, SERVICE_DOMAIN, (result) => {
    const action = result?.action;
    const svc = result?.service;
    if (!svc) return;

    if (action === 'resolved') {
      const id = svc?.txtRecord?.id;
      const name = svc?.txtRecord?.name || svc?.name || 'meshchat';
      const ipv4 = svc?.ipv4Addresses?.[0] || null;
      if (!id || id === myId) return;
      discoveredPeerById.set(id, { id, name, ipv4 });
      discoveredPeers = Array.from(discoveredPeerById.values()).sort((a, b) => a.name.localeCompare(b.name));
      renderDiscoveredPeers();
    } else if (action === 'removed') {
      // Best-effort removal by name (id not always available on removed events).
      for (const [id, p] of discoveredPeerById.entries()) {
        if (p.name === svc.name) discoveredPeerById.delete(id);
      }
      discoveredPeers = Array.from(discoveredPeerById.values()).sort((a, b) => a.name.localeCompare(b.name));
      renderDiscoveredPeers();
    }
  }, (err) => console.error('[Zeroconf] presence watch failed', err));
}

function ensureWatchingSignals() {
  const zeroconf = getZeroconf();
  if (!zeroconf || isWatchingSignals) return;
  isWatchingSignals = true;

  zeroconf.watch(SIGNAL_TYPE, SERVICE_DOMAIN, async (result) => {
    const action = result?.action;
    const svc = result?.service;
    if (!svc || action !== 'resolved') return;

    const from = svc?.txtRecord?.from;
    const to = svc?.txtRecord?.to;
    const t = svc?.txtRecord?.t;
    if (!from || !to || !t) return;
    if (to !== myId) return;

    const parsed = parseSignalTxt(svc.txtRecord);
    if (!parsed?.sdp) return;

    if (t === 'offer') {
      await handleIncomingOffer(from, parsed.sdp);
    } else if (t === 'answer') {
      await handleIncomingAnswer(from, parsed.sdp);
    }
  }, (err) => console.error('[Zeroconf] signal watch failed', err));
}

// ── Scan for peers via mDNS (Zeroconf) ─────────────────────────────
function scanForPeers() {
  peerDiscoverySection.classList.add('visible');
  peerListEl.innerHTML = '<div style="font-size:11px;color:var(--green-dark);padding:4px 0">Scanning...</div>';

  const zeroconf = getZeroconf();
  if (!zeroconf) {
    setTimeout(() => {
      peerListEl.innerHTML = '<div style="font-size:11px;color:var(--green-dark);">Zeroconf not available (dev mode)</div>';
    }, 250);
    return;
  }

  ensureWatchingPresence();
  ensureWatchingSignals();
  renderDiscoveredPeers();
}

// ════════════════════════════════════════════════════════════════
//  WebRTC mesh (1:1 datachannels per peer)
// ════════════════════════════════════════════════════════════════

function rtcConfig() {
  // LAN-only: host candidates should be enough in most Wi-Fi scenarios.
  return { iceServers: [] };
}

function upsertUserList() {
  const names = [myNick || 'YOU', ...Array.from(peers.values()).filter(p => p.connected).map(p => p.name)];
  renderUsers(names);
}

function sendToPeer(peerId, obj) {
  const p = peers.get(peerId);
  if (!p?.dc || p.dc.readyState !== 'open') return false;
  p.dc.send(JSON.stringify(obj));
  return true;
}

function broadcast(obj) {
  for (const peerId of peers.keys()) sendToPeer(peerId, obj);
}

async function createPeerConnection(peerId, peerName, isInitiator) {
  if (peers.has(peerId)) return peers.get(peerId);

  const pc = new RTCPeerConnection(rtcConfig());
  const peer = { id: peerId, name: peerName || peerId.slice(0, 8), pc, dc: null, connected: false };
  peers.set(peerId, peer);

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') {
      peer.connected = true;
      upsertUserList();
      appendSystem(`P2P connected: ${peer.name}`);
    } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected' || pc.connectionState === 'closed') {
      peer.connected = false;
      upsertUserList();
    }
  };

  pc.ondatachannel = (ev) => {
    peer.dc = ev.channel;
    wireDataChannel(peer);
  };

  if (isInitiator) {
    peer.dc = pc.createDataChannel('meshchat', { ordered: true });
    wireDataChannel(peer);
  }

  return peer;
}

function wireDataChannel(peer) {
  if (!peer.dc) return;
  peer.dc.onopen = () => {
    peer.connected = true;
    upsertUserList();
    // Introduce ourselves.
    peer.dc.send(JSON.stringify({ t: 'hello', id: myId, name: myNick }));
  };
  peer.dc.onclose = () => {
    peer.connected = false;
    upsertUserList();
  };
  peer.dc.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (_) { return; }
    handlePeerMessage(peer.id, msg);
  };
}

function handlePeerMessage(peerId, msg) {
  if (!msg || typeof msg !== 'object') return;
  const peer = peers.get(peerId);
  const fromName = peer?.name || msg?.from || 'PEER';

  if (msg.t === 'hello') {
    if (peer) peer.name = msg.name || peer.name;
    upsertUserList();
    return;
  }

  if (msg.t === 'chat') {
    appendMessage({ from: msg.from || fromName, text: msg.text || '', time: msg.time || '' }, false);
  } else if (msg.t === 'typing') {
    const nickname = msg.nickname || fromName;
    if (msg.state) typingPeers[nickname] = true;
    else delete typingPeers[nickname];
    updateTypingBar();
  } else if (msg.t === 'status') {
    appendStatus(msg.data);
  } else if (msg.t === 'system') {
    appendSystem(msg.text || '');
  }
}

async function waitForIceGatheringComplete(pc) {
  if (pc.iceGatheringState === 'complete') return;
  await new Promise((resolve) => {
    const check = () => {
      if (pc.iceGatheringState === 'complete') {
        pc.removeEventListener('icegatheringstatechange', check);
        resolve();
      }
    };
    pc.addEventListener('icegatheringstatechange', check);
    setTimeout(resolve, 2500); // safety
  });
}

async function beginConnect(peerId) {
  const discovered = discoveredPeerById.get(peerId);
  const peerName = discovered?.name || peerId.slice(0, 8);
  const peer = await createPeerConnection(peerId, peerName, true);

  const offer = await peer.pc.createOffer();
  await peer.pc.setLocalDescription(offer);
  await waitForIceGatheringComplete(peer.pc);

  publishSignal({ toId: peerId, sigType: 'offer', sdp: peer.pc.localDescription });
}

async function handleIncomingOffer(fromPeerId, remoteDesc) {
  const discovered = discoveredPeerById.get(fromPeerId);
  const peerName = discovered?.name || fromPeerId.slice(0, 8);
  const peer = await createPeerConnection(fromPeerId, peerName, false);

  await peer.pc.setRemoteDescription(remoteDesc);
  const answer = await peer.pc.createAnswer();
  await peer.pc.setLocalDescription(answer);
  await waitForIceGatheringComplete(peer.pc);

  publishSignal({ toId: fromPeerId, sigType: 'answer', sdp: peer.pc.localDescription });
}

async function handleIncomingAnswer(fromPeerId, remoteDesc) {
  const peer = peers.get(fromPeerId);
  if (!peer) return;
  if (peer.pc.signalingState === 'stable') return;
  await peer.pc.setRemoteDescription(remoteDesc);
}

// ════════════════════════════════════════════════════════════════
//  Join / Chat Logic
// ════════════════════════════════════════════════════════════════

function doJoin() {
  const nick = nicknameInput.value.trim().slice(0, 24);
  if (!nick) { nicknameInput.focus(); return; }

  myNick = nick;
  p2pReady = true;
  setP2pStatus(true);
  registerPresence();
  ensureWatchingPresence();
  ensureWatchingSignals();

  loginScreen.style.display = 'none';
  appEl.classList.add('visible');
  promptLabel.textContent = myNick + ' >';
  msgInput.focus();

  connStatus.textContent = 'P2P ONLINE';
  appendSystem('P2P ready. Use SCAN FOR PEERS, then tap a peer to connect.');
  upsertUserList();
}

// ── Send ──────────────────────────────────────────────────────────
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  appendMessage({ from: myNick, text, time: new Date().toLocaleTimeString('en-GB', { hour12: false }) }, true);
  broadcast({ t: 'chat', from: myNick, text, time: new Date().toLocaleTimeString('en-GB', { hour12: false }) });
  msgInput.value = '';
  clearTyping();
}
function clearTyping() {
  if (isTyping) {
    isTyping = false;
    broadcast({ t: 'typing', nickname: myNick, state: false });
  }
}

// ── Device data push ──────────────────────────────────────────────
pushDataBtn.addEventListener('click', async () => {
  const battery = await getBattery();
  const time    = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const data = { from: myNick, battery, time, serverTime: time };
  appendStatus(data);
  broadcast({ t: 'status', data });
  showToast('▲ Device data pushed to mesh.');
});

// ── Event listeners ───────────────────────────────────────────────
joinBtn.addEventListener('click', doJoin);
scanBtn.addEventListener('click', scanForPeers);
nicknameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') joinBtn.click();
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); return; }
  if (!myNick) return;
  if (!isTyping) {
    isTyping = true;
    broadcast({ t: 'typing', nickname: myNick, state: true });
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    isTyping = false;
    broadcast({ t: 'typing', nickname: myNick, state: false });
  }, 2000);
});
sendBtn.addEventListener('click', sendMessage);

// ── Boot ──────────────────────────────────────────────────────────
setP2pStatus(true);
ensureWatchingPresence();
ensureWatchingSignals();
</script>
